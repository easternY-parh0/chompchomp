<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chomp Chocolate Loading</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oi&display=swap');

        :root {
            --milk-chocolate: #4A2E2B;
            --dark-chocolate: #2B1615;
            --bg-color: #F3E5D8; /* 부드러운 밀크 크림 색상 */
        }

        body {
            margin: 0;
            background-color: #222;
        }

        /* 로딩 화면 컨테이너 */
        #loading-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            perspective: 1000px; /* 3D 효과용 */
            overflow: hidden;
            transition: opacity 0.5s ease;
        }

        /* 전체 텍스트 박스 */
        .logo-wrap {
            display: flex;
            font-family: 'Oi', serif;
            font-size: 5rem;
            color: var(--milk-chocolate);
            text-shadow: 3px 5px 0px var(--dark-chocolate);
            user-select: none;
            position: relative;
        }

        /* 한 글자씩 뿅뿅 나오는 효과 */
        .char {
            display: inline-block;
            opacity: 0;
            transform: scale(0.3) translateY(50px);
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* 글자별 딜레이 설정 */
        .left-part .char:nth-child(1) { animation-delay: 0.2s; } /* C */
        .left-part .char:nth-child(2) { animation-delay: 0.4s; } /* H */
        .left-part .char:nth-child(3) { animation-delay: 0.6s; } /* O */

        .right-part .char:nth-child(1) { animation-delay: 0.8s; } /* M */
        .right-part .char:nth-child(2) { animation-delay: 1.0s; } /* P */
        .right-part .char:nth-child(3) { animation-delay: 1.2s; } /* ! */

        @keyframes popIn {
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        /* 킷캣 부러지는 연출용 그룹 분할 */
        .part {
            display: flex;
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* 부러지는 모션 클래스 (JS로 추가) */
        .logo-wrap.shatter .left-part {
            transform: translateX(-30px) translateY(20px) rotate(-15deg);
        }
        .logo-wrap.shatter .right-part {
            transform: translateX(30px) translateY(25px) rotate(12deg);
        }

        /* 초콜렛 부스러기 이펙트 */
        .crumb {
            position: absolute;
            width: 8px;
            height: 8px;
            background-color: var(--milk-chocolate);
            border-radius: 2px;
            pointer-events: none;
            box-shadow: 1px 2px 0px var(--dark-chocolate);
        }
    </style>
</head>
<body>

    <div id="loading-container">
        <div class="logo-wrap" id="logo">
            <div class="part left-part">
                <span class="char">C</span>
                <span class="char">H</span>
                <span class="char">O</span>
            </div>
            <div class="part right-part">
                <span class="char">M</span>
                <span class="char">P</span>
                <span class="char">!</span>
            </div>
        </div>
    </div>
    <script>
        const logo = document.getElementById('logo');
        const container = document.getElementById('loading-container');

        // 초콜렛 부스러기 생성 함수
        function createCrumbs() {
            const rect = logo.getBoundingClientRect();
            // CHO와 MP! 사이의 중앙 좌표 계산
            const centerX = rect.left + (rect.width / 2);
            const centerY = rect.top + (rect.height / 2);

            for (let i = 0; i < 30; i++) {
                const crumb = document.createElement('div');
                crumb.classList.add('crumb');
                container.appendChild(crumb);

                // 부스러기 초기 위치를 중앙으로 세팅
                crumb.style.left = `${centerX}px`;
                crumb.style.top = `${centerY}px`;

                // 크기 랜덤
                const size = Math.random() * 8 + 4;
                crumb.style.width = `${size}px`;
                crumb.style.height = `${size}px`;

                // 사방으로 튀는 물리 효과 계산
                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 150 + 50; // 튀어나가는 힘
                const destinationX = Math.cos(angle) * velocity;
                const destinationY = Math.sin(angle) * velocity + 100; // 중력 효과 포함

                // 애니메이션 적용
                const animation = crumb.animate([
                    { transform: 'translate(0, 0) scale(1) rotate(0deg)', opacity: 1 },
                    { transform: `translate(${destinationX}px, ${destinationY}px) scale(0) rotate(${Math.random() * 360}deg)`, opacity: 0 }
                ], {
                    duration: Math.random() * 600 + 400,
                    easing: 'cubic-bezier(0.1, 0.8, 0.3, 1)'
                });

                // 애니메이션 끝나면 요소 삭제
                animation.onfinish = () => crumb.remove();
            }
        }

        // 실제 프로젝트에서는 window.onload 시점에 맞추시면 됩니다.
        // 여기서는 연출을 보기 위해 2.5초 뒤에 자동으로 부서지도록 설정했습니다.
        setTimeout(() => {
            logo.classList.add('shatter'); // 킷캣처럼 쪼개기
            createCrumbs(); // 부스러기 파티클 펑!

            // 부서진 후 로딩 화면 투명하게 사라지기
            setTimeout(() => {
                container.style.opacity = '0';
                setTimeout(() => {
                    container.style.display = 'none';
                }, 500);
            }, 1000); 

        }, 2500); 
    </script>
</body>
</html>
